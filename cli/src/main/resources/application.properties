spring.batch.job.enabled=false

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/data_quality}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:dq}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:change_me}

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.yaml