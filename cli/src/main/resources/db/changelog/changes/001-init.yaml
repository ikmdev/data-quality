databaseChangeLog:
    -   changeSet:
            id: create-piqi-evaluation-run-table
            author: cli-app
            changes:
                # 1. The Parent Evaluation Run Tracking Table
                -   createTable:
                        tableName: piqi_evaluation_run
                        columns:
                            -   column:
                                    name: id
                                    type: BIGSERIAL
                                    constraints:
                                        primaryKey: true
                                        primaryKeyName: pk_piqi_evaluation_run
                            -   column:
                                    name: run_name
                                    type: VARCHAR(100)
                                    constraints:
                                        nullable: false
                                        unique: true
                            -   column:
                                    name: status
                                    type: VARCHAR(20)
                                    defaultValue: INGESTING
                                    constraints:
                                        nullable: false
                            -   column:
                                    name: total_records
                                    type: BIGINT
                                    defaultValueNumeric: 0
                            -   column:
                                    name: total_completed
                                    type: BIGINT
                                    defaultValueNumeric: 0
                            -   column:
                                    name: total_failed
                                    type: BIGINT
                                    defaultValueNumeric: 0
                            -   column:
                                    name: created_at
                                    type: TIMESTAMP WITH TIME ZONE
                                    defaultValueComputed: CURRENT_TIMESTAMP
                            -   column:
                                    name: completed_at
                                    type: TIMESTAMP WITH TIME ZONE
            rollback:
                -   dropTable:
                        tableName: piqi_evaluation_run

    -   changeSet:
            id: create-piqi-evaluation-queue-table
            author: cli-app
            changes:
                # 2. The High-Throughput Queue Table
                -   createTable:
                        tableName: piqi_evaluation_queue
                        columns:
                            -   column:
                                    name: id
                                    type: BIGSERIAL
                                    constraints:
                                        primaryKey: true
                                        primaryKeyName: pk_piqi_evaluation_queue
                            -   column:
                                    name: run_id
                                    type: BIGINT
                                    constraints:
                                        nullable: false
                                        foreignKeyName: fk_queue_to_run
                                        references: piqi_evaluation_run(id)
                                        deleteCascade: true
                            -   column:
                                    name: payload_json
                                    type: JSONB
                                    constraints:
                                        nullable: false
                            -   column:
                                    name: status
                                    type: VARCHAR(20)
                                    defaultValue: PENDING
                                    constraints:
                                        nullable: false
                            -   column:
                                    name: retry_count
                                    type: INT
                                    defaultValueNumeric: 0
                                    constraints:
                                        nullable: false
                            -   column:
                                    name: error_message
                                    type: TEXT
                            -   column:
                                    name: created_at
                                    type: TIMESTAMP WITH TIME ZONE
                                    defaultValueComputed: CURRENT_TIMESTAMP

                -   createIndex:
                        indexName: idx_piqi_queue_status
                        tableName: piqi_evaluation_queue
                        columns:
                            -   column:
                                    name: run_id
                            -   column:
                                    name: status

                -   sql:
                        dbms: postgresql
                        sql: >
                            CREATE INDEX idx_piqi_queue_pending 
                            ON public.piqi_evaluation_queue (run_id, id) 
                            WHERE status = 'PENDING';

            rollback:
                -   dropTable:
                        tableName: piqi_evaluation_queue
                -   sql:
                        dbms: postgresql
                        sql: DROP INDEX IF EXISTS idx_piqi_queue_pending;

    -   changeSet:
            id: create-piqi-assessment-results-table
            author: cli-app
            changes:
                # 3. The Clinical Evaluation Results Table
                -   createTable:
                        tableName: piqi_assessment_results
                        columns:
                            -   column:
                                    name: id
                                    type: BIGSERIAL
                                    constraints:
                                        primaryKey: true
                                        primaryKeyName: pk_piqi_assessment_results
                            -   column:
                                    name: run_id
                                    type: BIGINT
                                    constraints:
                                        nullable: false
                                        foreignKeyName: fk_results_to_run
                                        references: piqi_evaluation_run(id)
                                        deleteCascade: true
                            -   column:
                                    name: row_num
                                    type: INTEGER
                            -   column:
                                    name: message_id
                                    type: TEXT
                                    constraints:
                                        nullable: false
                            -   column:
                                    name: data_class
                                    type: VARCHAR(50)
                                    constraints:
                                        nullable: false
                            -   column:
                                    name: attribute_name
                                    type: TEXT
                                    constraints:
                                        nullable: false
                            -   column:
                                    name: attribute_value
                                    type: TEXT
                            -   column:
                                    name: assessment
                                    type: VARCHAR(50)
                            -   column:
                                    name: status
                                    type: VARCHAR(50)
                            -   column:
                                    name: reason
                                    type: TEXT
                            -   column:
                                    name: effect
                                    type: TEXT
                            -   column:
                                    name: created_at
                                    type: TIMESTAMP WITH TIME ZONE
                                    defaultValueComputed: CURRENT_TIMESTAMP
                                    constraints:
                                        nullable: false

                -   createIndex:
                        indexName: idx_piqi_results_run_status
                        tableName: piqi_assessment_results
                        columns:
                            -   column:
                                    name: run_id
                            -   column:
                                    name: status

            rollback:
                -   dropTable:
                        tableName: piqi_assessment_results