databaseChangeLog:
    -   changeSet:
            id: create-piqi-evaluation-run-table
            author: cli-app
            changes:
                # 1. The Parent Evaluation Run Tracking Table
                -   createTable:
                        tableName: piqi_evaluation_run
                        columns:
                            -   column:
                                    name: id
                                    type: BIGSERIAL
                                    constraints:
                                        primaryKey: true
                                        primaryKeyName: pk_piqi_evaluation_run
                            -   column:
                                    name: run_name
                                    type: VARCHAR(100)
                                    constraints:
                                        nullable: false
                                        unique: true
                            -   column:
                                    name: status
                                    type: VARCHAR(20)
                                    defaultValue: INGESTING
                                    constraints:
                                        nullable: false
                            -   column:
                                    name: total_records
                                    type: BIGINT
                                    defaultValueNumeric: 0
                            -   column:
                                    name: total_completed
                                    type: BIGINT
                                    defaultValueNumeric: 0
                            -   column:
                                    name: total_failed
                                    type: BIGINT
                                    defaultValueNumeric: 0
                            -   column:
                                    name: created_at
                                    type: TIMESTAMP WITH TIME ZONE
                                    defaultValueComputed: CURRENT_TIMESTAMP
                            -   column:
                                    name: completed_at
                                    type: TIMESTAMP WITH TIME ZONE
            rollback:
                -   dropTable:
                        tableName: piqi_evaluation_run

    -   changeSet:
            id: create-piqi-evaluation-queue-table
            author: cli-app
            changes:
                # 2. The High-Throughput Queue Table
                -   createTable:
                        tableName: piqi_evaluation_queue
                        columns:
                            -   column:
                                    name: id
                                    type: BIGSERIAL
                                    constraints:
                                        primaryKey: true
                                        primaryKeyName: pk_piqi_evaluation_queue
                            -   column:
                                    name: run_id
                                    type: BIGINT
                                    constraints:
                                        nullable: false
                                        foreignKeyName: fk_queue_to_run
                                        references: piqi_evaluation_run(id)
                                        deleteCascade: true
                            -   column:
                                    name: payload_json
                                    type: JSONB
                                    constraints:
                                        nullable: false
                            -   column:
                                    name: status
                                    type: VARCHAR(20)
                                    defaultValue: PENDING
                                    constraints:
                                        nullable: false
                            -   column:
                                    name: retry_count
                                    type: INT
                                    defaultValueNumeric: 0
                                    constraints:
                                        nullable: false
                            -   column:
                                    name: error_message
                                    type: TEXT
                            -   column:
                                    name: created_at
                                    type: TIMESTAMP WITH TIME ZONE
                                    defaultValueComputed: CURRENT_TIMESTAMP

                -   createIndex:
                        indexName: idx_piqi_queue_status
                        tableName: piqi_evaluation_queue
                        columns:
                            -   column:
                                    name: run_id
                            -   column:
                                    name: status

                -   sql:
                        dbms: postgresql
                        sql: >
                            CREATE INDEX idx_piqi_queue_pending 
                            ON public.piqi_evaluation_queue (run_id, id) 
                            WHERE status = 'PENDING';

            rollback:
                -   dropTable:
                        tableName: piqi_evaluation_queue
                -   sql:
                        dbms: postgresql
                        sql: DROP INDEX IF EXISTS idx_piqi_queue_pending;

    -   changeSet:
            id: create-piqi-assessment-results-table
            author: cli-app
            changes:
                # 3. The Clinical Evaluation Results Table
                -   createTable:
                        tableName: piqi_assessment_results
                        columns:
                            -   column:
                                    name: id
                                    type: BIGSERIAL
                                    constraints:
                                        primaryKey: true
                                        primaryKeyName: pk_piqi_assessment_results
                            -   column:
                                    name: run_id
                                    type: BIGINT
                                    constraints:
                                        nullable: false
                                        foreignKeyName: fk_results_to_run
                                        references: piqi_evaluation_run(id)
                                        deleteCascade: true
                            -   column:
                                    name: row_num
                                    type: INTEGER
                            -   column:
                                    name: message_id
                                    type: TEXT
                                    constraints:
                                        nullable: false
                            -   column:
                                    name: data_class
                                    type: VARCHAR(50)
                                    constraints:
                                        nullable: false
                            -   column:
                                    name: attribute_name
                                    type: TEXT
                                    constraints:
                                        nullable: false
                            -   column:
                                    name: attribute_value
                                    type: TEXT
                            -   column:
                                    name: assessment
                                    type: VARCHAR(50)
                            -   column:
                                    name: status
                                    type: VARCHAR(50)
                            -   column:
                                    name: reason
                                    type: TEXT
                            -   column:
                                    name: effect
                                    type: TEXT
                            -   column:
                                    name: created_at
                                    type: TIMESTAMP WITH TIME ZONE
                                    defaultValueComputed: CURRENT_TIMESTAMP
                                    constraints:
                                        nullable: false

                -   createIndex:
                        indexName: idx_piqi_results_run_status
                        tableName: piqi_assessment_results
                        columns:
                            -   column:
                                    name: run_id
                            -   column:
                                    name: status

            rollback:
                -   dropTable:
                        tableName: piqi_assessment_results

    -   changeSet:
            id: create-postgrest-web-anon-role
            author: cli-app
            changes:
                # 1. Role used by PostgREST for unauthenticated requests
                -   sql:
                        dbms: postgresql
                        splitStatements: false
                        sql: >
                            DO $$
                            BEGIN
                              IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'web_anon') THEN
                                CREATE ROLE web_anon NOLOGIN;
                              END IF;
                            END
                            $$;
            rollback:
                -   sql:
                        dbms: postgresql
                        sql: DROP ROLE IF EXISTS web_anon;

    -   changeSet:
            id: grant-postgrest-permissions-to-piqi-tables
            author: cli-app
            changes:
                -   sql:
                        dbms: postgresql
                        sql: >
                            -- 2. Basic schema usage
                            GRANT USAGE ON SCHEMA public TO web_anon;
                            
                            -- 3. Read/write permissions on target tables
                            GRANT SELECT, INSERT, UPDATE, DELETE ON TABLE public.piqi_evaluation_run TO web_anon;
                            GRANT SELECT, INSERT, UPDATE, DELETE ON TABLE public.piqi_evaluation_queue TO web_anon;
                            GRANT SELECT, INSERT, UPDATE, DELETE ON TABLE public.piqi_assessment_results TO web_anon;
                            
                            -- Assuming piqi_scores is created in an earlier changeset not shown
                            GRANT SELECT, INSERT, UPDATE, DELETE ON TABLE public.piqi_scores TO web_anon;
                            
                            -- 4. Permissions on the auto-generated BIGSERIAL sequences
                            GRANT USAGE, SELECT ON SEQUENCE public.piqi_evaluation_run_id_seq TO web_anon;
                            GRANT USAGE, SELECT ON SEQUENCE public.piqi_evaluation_queue_id_seq TO web_anon;
                            GRANT USAGE, SELECT ON SEQUENCE public.piqi_assessment_results_id_seq TO web_anon;
                            
                            -- Assuming piqi_scores uses a SERIAL/BIGSERIAL identity
                            GRANT USAGE, SELECT ON SEQUENCE public.piqi_scores_id_seq TO web_anon;

            rollback:
                -   sql:
                        dbms: postgresql
                        sql: >
                            REVOKE USAGE, SELECT ON SEQUENCE public.piqi_evaluation_run_id_seq FROM web_anon;
                            REVOKE USAGE, SELECT ON SEQUENCE public.piqi_evaluation_queue_id_seq FROM web_anon;
                            REVOKE USAGE, SELECT ON SEQUENCE public.piqi_assessment_results_id_seq FROM web_anon;
                            REVOKE USAGE, SELECT ON SEQUENCE public.piqi_scores_id_seq FROM web_anon;
                            
                            REVOKE SELECT, INSERT, UPDATE, DELETE ON TABLE public.piqi_evaluation_run FROM web_anon;
                            REVOKE SELECT, INSERT, UPDATE, DELETE ON TABLE public.piqi_evaluation_queue FROM web_anon;
                            REVOKE SELECT, INSERT, UPDATE, DELETE ON TABLE public.piqi_assessment_results FROM web_anon;
                            REVOKE SELECT, INSERT, UPDATE, DELETE ON TABLE public.piqi_scores FROM web_anon;
                            
                            REVOKE USAGE ON SCHEMA public FROM web_anon;