services:
    nginx:
        image: nginx:alpine
        container_name: dq-nginx
        restart: unless-stopped
        ports:
            - "${NGINX_PORT:-80}:80"
        volumes:
            - ./nginx/conf.d:/etc/nginx/conf.d:ro
        depends_on:
            - app
            - pgadmin
            - superset
            - piqi

    postgres:
        image: postgres:16
        container_name: dq-postgres
        restart: unless-stopped
        ports:
            - "${POSTGRES_PORT:-5432}:5432"
        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
            interval: 5s
            timeout: 5s
            retries: 5

    postgrest:
        image: postgrest/postgrest:v12.2.0
        container_name: postgrest
        depends_on:
            postgres:
                condition: service_started
            liquibase:
                condition: service_completed_successfully
        environment:
            PGRST_DB_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
            PGRST_DB_SCHEMA: ${PGRST_DB_SCHEMA}
            PGRST_DB_ANON_ROLE: ${PGRST_DB_ANON_ROLE}
            PGRST_SERVER_PORT: ${PGRST_SERVER_PORT}
            PGRST_SERVER_CORS_ALLOWED_ORIGINS: ${APP_BASE_URL}
            PGRST_SERVER_PROXY_URI: ${APP_BASE_URL}/postgrest

    pgadmin:
        image: dpage/pgadmin4:8
        container_name: dq-pgadmin
        restart: unless-stopped
        environment:
            PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
            PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
            PGADMIN_CONFIG_SERVER_MODE: "True"
            PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "False"
            PGADMIN_CONFIG_CONSOLE_LOG_LEVEL: "10"
            SCRIPT_NAME: /pgadmin
        depends_on:
            - postgres
        volumes:
            - pgadmin_data:/var/lib/pgadmin

    liquibase:
        image: liquibase/liquibase:4.25.0-alpine
        container_name: dq-liquibase
        depends_on:
            - postgres
        volumes:
            - ./cli/src/main/resources/db/changelog:/liquibase/changelog:ro
        command:
          [
              "--url=${LIQUIBASE_CONN_STRING}",
              "--username=${LIQUIBASE_USERNAME}",
              "--password=${LIQUIBASE_PASSWORD}",
              "--changeLogFile=/changelog/db.changelog-master.yaml",
              "update"
          ]

    superset:
        build:
            context: .
            dockerfile: Dockerfile.superset
        container_name: dq-superset
        restart: unless-stopped
        ports:
            - "8088:8088"
        environment:
            SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
            SQLALCHEMY_DATABASE_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
        depends_on:
            postgres:
                condition: service_healthy
            superset-init:
                condition: service_completed_successfully
        volumes:
            - superset_home:/app/superset_home

    superset-init:
        build:
            context: .
            dockerfile: Dockerfile.superset
        container_name: dq-superset-init
        environment:
            SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
            SQLALCHEMY_DATABASE_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
            SUPERSET_ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME}
            SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD}
            SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL}
        depends_on:
            postgres:
                condition: service_healthy
        command: >
            bash -c "
            superset db upgrade &&
            superset init &&
            superset fab create-admin --username $${SUPERSET_ADMIN_USERNAME} --firstname Admin --lastname User --email $${SUPERSET_ADMIN_EMAIL} --password $${SUPERSET_ADMIN_PASSWORD} || true
            "
        restart: "no"
        volumes:
            - superset_home:/app/superset_home

    piqi:
        build:
            context: ./reference_application
            dockerfile: Dockerfile
        container_name: piqi-engine
        restart: unless-stopped
        environment:
            - ASPNETCORE_ENVIRONMENT=${PIQI_ENVIRONMENT_NAME}
            - ASPNETCORE_HTTP_PORTS=${PIQI_ENGINE_PORT}
        depends_on:
            - postgres

    app:
        build:
            context: ./app
            dockerfile: Dockerfile
        container_name: dq-app
        restart: unless-stopped
        volumes:
            - ./app:/usr/share/nginx/html
        depends_on:
            - piqi

volumes:
    postgres_data:
    pgadmin_data:
    superset_home: