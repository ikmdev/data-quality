services:
    nginx:
        image: nginx:alpine
        container_name: dq-nginx
        restart: unless-stopped
        ports:
            - "${NGINX_PORT:-80}:80"
        volumes:
            - ./nginx/conf.d:/etc/nginx/conf.d:ro
        depends_on:
            - api
            - ui
            - pgadmin
            - superset
            - piqi

    postgres:
        image: postgres:16
        container_name: dq-postgres
        restart: unless-stopped
        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
            interval: 5s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        container_name: dq-redis
        restart: unless-stopped

    pgadmin:
        image: dpage/pgadmin4:8
        container_name: dq-pgadmin
        restart: unless-stopped
        environment:
            PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
            PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
            PGADMIN_CONFIG_SERVER_MODE: "True"
            PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "False"
            PGADMIN_CONFIG_CONSOLE_LOG_LEVEL: "10"
        depends_on:
            - postgres
        volumes:
            - pgadmin_data:/var/lib/pgadmin

    liquibase:
        image: liquibase/liquibase:4.25.0-alpine
        container_name: dq-liquibase
        depends_on:
            - postgres
        volumes:
            - ./cli/src/main/resources/db/changelog:/liquibase/changelog:ro
        command:
          [
              "--url=${LIQUIBASE_URL}",
              "--username=${LIQUIBASE_USERNAME}",
              "--password=${LIQUIBASE_PASSWORD}",
              "--changeLogFile=/changelog/db.changelog-master.yaml",
              "update"
          ]

    superset:
        image: apache/superset:latest
        container_name: dq-superset
        restart: unless-stopped
        environment:
            SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
            SQLALCHEMY_DATABASE_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
        depends_on:
            postgres:
                condition: service_healthy
            superset-init:
                condition: service_completed_successfully
        volumes:
            - superset_home:/app/superset_home

    superset-init:
        image: apache/superset:latest
        container_name: dq-superset-init
        environment:
            SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
            SQLALCHEMY_DATABASE_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
            SUPERSET_ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME}
            SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD}
            SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL}
        depends_on:
            postgres:
                condition: service_healthy
        command: >
            bash -c "
            superset db upgrade &&
            superset init &&
            superset fab create-admin --username $${SUPERSET_ADMIN_USERNAME} --firstname Admin --lastname User --email $${SUPERSET_ADMIN_EMAIL} --password $${SUPERSET_ADMIN_PASSWORD} || true
            "
        restart: "no"
        volumes:
            - superset_home:/app/superset_home

    piqi:
        build:
            context: ./reference_application
            dockerfile: Dockerfile
        container_name: piqi-engine
        restart: unless-stopped
        environment:
            - ASPNETCORE_ENVIRONMENT=${PIQI_ENVIRONMENT_NAME}
            - ASPNETCORE_HTTP_PORTS=${PIQI_ENGINE_PORT:-8080}
            - Database__Type=${PIQI_DB_TYPE}
        depends_on:
            - postgres

    api:
        build:
            context: ./spa/api
            dockerfile: Dockerfile
        container_name: dq-api
        restart: unless-stopped
        environment:
            PORT: 5026
            HOST: 0.0.0.0
            DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
            REDIS_URL: redis://redis:6379
        depends_on:
            - postgres
            - redis
            - piqi

    ui:
        build:
            context: ./spa/ui
            dockerfile: Dockerfile
        container_name: dq-ui
        restart: unless-stopped
        depends_on:
            - api

volumes:
    postgres_data:
    pgadmin_data:
    superset_home: