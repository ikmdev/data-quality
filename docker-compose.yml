services:
    nginx:
        image: nginx:alpine
        container_name: dq-nginx
        restart: unless-stopped
        ports:
            - "${NGINX_PORT:-80}:80"
        volumes:
            - ./nginx/conf.d:/etc/nginx/conf.d:ro
        depends_on:
            - api
            - ui
            - pgadmin
            - superset

    postgres:
        image: postgres:16
        container_name: dq-postgres
        restart: unless-stopped
        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        volumes:
            - postgres_data:/var/lib/postgresql/data

    redis:
        image: redis:7-alpine
        container_name: dq-redis
        restart: unless-stopped

    pgadmin:
        image: dpage/pgadmin4:8
        container_name: dq-pgadmin
        restart: unless-stopped
        environment:
            PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
            PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
            PGADMIN_CONFIG_SERVER_MODE: "True"
            SCRIPT_NAME: /
        depends_on:
            - postgres
        volumes:
            - pgadmin_data:/var/lib/pgadmin

    liquibase:
        image: liquibase/liquibase:4.25.0-alpine
        container_name: dq-liquibase
        depends_on:
            - postgres
        volumes:
            - ./cli/src/main/resources/db/changelog:/liquibase/changelog:ro
        command:
          [
              "--url=${LIQUIBASE_URL}",
              "--username=${LIQUIBASE_USERNAME}",
              "--password=${LIQUIBASE_PASSWORD}",
              "--changeLogFile=/changelog/db.changelog-master.yaml",
              "update"
          ]

    superset:
        image: apache/superset:latest
        container_name: dq-superset
        restart: unless-stopped
        environment:
            SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
            SQLALCHEMY_DATABASE_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
            WEBSERVER_ROOT_PATH: /superset/
            ENABLE_PROXY_FIX: "True"
        depends_on:
            - postgres
        volumes:
            - superset_data:/app/superset_home

    api:
        build:
            context: ./spa/api
            dockerfile: Dockerfile
        container_name: dq-api
        restart: unless-stopped
        environment:
            PORT: 5026
            HOST: 0.0.0.0
            DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
            REDIS_URL: redis://redis:6379
        depends_on:
            - postgres
            - redis

    ui:
        build:
            context: ./spa/ui
            dockerfile: Dockerfile
        container_name: dq-ui
        restart: unless-stopped
        depends_on:
            - api

volumes:
    postgres_data:
    pgadmin_data:
    superset_data: